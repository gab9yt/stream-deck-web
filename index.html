<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamDeck C3 - Configurateur</title>
    <style>
        :root {
            --primary: #00dc82;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 1px solid #334155;
        }

        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--primary); }

        .recorder-zone {
            background: #000;
            border: 2px dashed #334155;
            border-radius: 1rem;
            padding: 2rem;
            margin: 1.5rem 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .recorder-zone:focus {
            border-color: var(--primary);
            outline: none;
            background: #020617;
        }

        .key-badge {
            display: inline-block;
            background: var(--primary);
            color: #000;
            padding: 0.2rem 0.6rem;
            border-radius: 0.4rem;
            margin: 0.2rem;
            font-weight: bold;
            font-family: monospace;
        }

        button {
            width: 100%;
            padding: 0.8rem;
            border-radius: 0.75rem;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
            margin-top: 0.5rem;
        }

        button:active { transform: scale(0.98); }

        .btn-connect { background: #334155; color: white; }
        .btn-send { background: var(--primary); color: #000; margin-top: 1rem; }
        .btn-send:disabled { background: #475569; opacity: 0.5; }

        #status { font-size: 0.875rem; margin-top: 1rem; color: #94a3b8; }
        .hint { font-size: 0.8rem; color: #64748b; margin-bottom: 0.5rem; }
    </style>
</head>
<body>

<div class="container">
    <h1>StreamDeck C3</h1>
    
    <button id="connectBtn" class="btn-connect">1. Brancher l'appareil (USB)</button>
    
    <div id="status">Statut : Non connecté</div>

    <div style="margin-top: 2rem;">
        <p class="hint">Cliquez ci-dessous et tapez votre raccourci :</p>
        <div id="recorder" class="recorder-zone" tabindex="0">
            <div id="keyDisplay">--- Prêt ---</div>
        </div>
        <button id="clearBtn" style="background: transparent; color: #94a3b8; font-size: 0.8rem; width: auto;">Effacer</button>
    </div>

    <button id="sendBtn" class="btn-send" disabled>2. Enregistrer sur le bouton Pin 0</button>
</div>

<script>
    let port;
    let capturedCodes = [];
    let capturedNames = [];

    const connectBtn = document.getElementById('connectBtn');
    const sendBtn = document.getElementById('sendBtn');
    const recorder = document.getElementById('recorder');
    const keyDisplay = document.getElementById('keyDisplay');
    const status = document.getElementById('status');
    const clearBtn = document.getElementById('clearBtn');

    // Connexion Web Serial
    connectBtn.addEventListener('click', async () => {
        try {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            status.innerText = "✅ Connecté sur le Port USB";
            status.style.color = "#00dc82";
            connectBtn.style.display = "none";
            sendBtn.disabled = false;
        } catch (e) {
            status.innerText = "❌ Erreur de connexion";
        }
    });

    // Capture des touches clavier
    recorder.addEventListener('keydown', (e) => {
        e.preventDefault();
        
        let code = e.keyCode;
        let name = e.key.toUpperCase();

        // Traduction pour HijelHID_BLEKeyboard (Codes Arduino)
        const specialKeys = {
            'Control': 128,
            'Shift': 129,
            'Alt': 130,
            'Meta': 131, // Touche Windows
            'Enter': 176,
            ' ': 179,    // Espace
            'Backspace': 178,
            'Tab': 177,
            'Escape': 177
        };

        if (specialKeys[e.key]) {
            code = specialKeys[e.key];
            name = e.key === ' ' ? 'ESPACE' : e.key.toUpperCase();
        }

        if (!capturedCodes.includes(code)) {
            if (capturedCodes.length >= 10) return; // Limite de 10 touches
            capturedCodes.push(code);
            capturedNames.push(name);
            renderKeys();
        }
    });

    function renderKeys() {
        if (capturedNames.length === 0) {
            keyDisplay.innerHTML = "--- Prêt ---";
            return;
        }
        keyDisplay.innerHTML = capturedNames.map(k => `<span class="key-badge">${k}</span>`).join(' + ');
    }

    clearBtn.addEventListener('click', () => {
        capturedCodes = [];
        capturedNames = [];
        renderKeys();
    });

    // Envoi à l'ESP32
    sendBtn.addEventListener('click', async () => {
        if (capturedCodes.length === 0) {
            alert("Veuillez d'abord enregistrer un raccourci !");
            return;
        }

        const encoder = new TextEncoder();
        const writer = port.writable.getWriter();
        const command = "SET_MACRO:" + capturedCodes.join(",") + "\n";
        
        try {
            await writer.write(encoder.encode(command));
            status.innerText = "🚀 Enregistré ! L'appareil redémarre...";
            capturedCodes = [];
            capturedNames = [];
            renderKeys();
        } catch (e) {
            status.innerText = "❌ Erreur d'envoi";
        } finally {
            writer.releaseLock();
        }
    });
</script>

</body>
</html>
