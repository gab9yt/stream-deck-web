<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>StreamDeck C3 - Configurateur</title>
    <style>
        body { background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 40px; }
        .container { background: #1e293b; border-radius: 20px; padding: 30px; display: inline-block; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .status { margin: 20px; padding: 10px; border-radius: 10px; font-weight: bold; background: #334155; }
        .keys-display { font-size: 32px; color: #10b981; margin: 30px; min-height: 50px; background: #0f172a; padding: 20px; border-radius: 10px; border: 2px dashed #334155; }
        button { cursor: pointer; border: none; padding: 15px 30px; border-radius: 10px; font-size: 16px; font-weight: bold; transition: 0.2s; margin: 10px; }
        .btn-connect { background: #3b82f6; color: white; }
        .btn-save { background: #10b981; color: white; opacity: 0.5; }
        button:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
        button:disabled { cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 StreamDeck C3</h1>
        <div id="status" class="status">Statut : Non connecté</div>
        
        <button id="btnConnect" class="btn-connect">1. Brancher & Sélectionner l'ESP32</button>
        
        <p>Appuyez sur vos touches clavier (ex: Ctrl + C) :</p>
        <div id="display" class="keys-display">---</div>
        
        <button id="btnSave" class="btn-save" disabled>2. Enregistrer sur la carte</button>
        <button id="btnClear" style="background:#ef4444; color:white;">Effacer</button>
    </div>

    <script>
        let port; 
        let codes = [];
        const btnConnect = document.getElementById('btnConnect');
        const btnSave = document.getElementById('btnSave');
        const display = document.getElementById('display');
        const status = document.getElementById('status');

        // Mapping des touches spéciales pour l'ESP32
        const specialKeys = {
            'Control': 128, 'Shift': 129, 'Alt': 130, 'Meta': 131, 'OS': 131
        };

        btnConnect.onclick = async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                status.innerText = "Statut : ✅ Connecté à l'ESP32";
                status.style.color = "#10b981";
                btnSave.disabled = false;
                btnSave.style.opacity = "1";
            } catch (err) {
                alert("Erreur : " + err.message);
            }
        };

        window.onkeydown = (e) => {
            e.preventDefault();
            let keyName = e.key;
            let code = e.keyCode;

            if (specialKeys[e.key]) {
                code = specialKeys[e.key];
            }

            if (!codes.includes(code)) {
                codes.push(code);
                render();
            }
        };

        function render() {
            display.innerText = codes.length > 0 ? codes.join(" + ") : "---";
        }

        document.getElementById('btnClear').onclick = () => {
            codes = [];
            render();
        };

        btnSave.onclick = async () => {
            if (codes.length === 0) return alert("Choisis des touches d'abord !");
            
            const encoder = new TextEncoder();
            const writer = port.writable.getWriter();
            const message = "SET:" + codes.join(",") + "\n";
            
            await writer.write(encoder.encode(message));
            writer.releaseLock();
            
            alert("Configuration envoyée ! L'appareil va redémarrer.");
            codes = [];
            render();
        };
    </script>
</body>
</html>
