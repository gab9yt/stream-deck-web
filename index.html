<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Configurateur 19200</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { background: #333; padding: 30px; border-radius: 20px; display: inline-block; }
        .key-view { font-size: 40px; color: #00ff88; margin: 20px; }
        button { padding: 15px 25px; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; margin: 10px; }
        #btnConnect { background: #4444ff; color: white; }
        #btnSave { background: #00aa66; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Config StreamDeck (19200)</h1>
        <button id="btnConnect">1. Connecter l'USB</button>
        <div class="key-view" id="display">---</div>
        <button id="btnSave" disabled>2. Envoyer la Touche</button>
        <p>Statut : <span id="stat">Déconnecté</span></p>
    </div>

    <script>
        let port; let codes = [];
        const stat = document.getElementById('stat');

        document.getElementById('btnConnect').onclick = async () => {
            try {
                port = await navigator.serial.requestPort();
                // ON FORCE LE 19200 ICI
                await port.open({ baudRate: 19200 }); 
                stat.innerText = "Connecté !";
                document.getElementById('btnSave').disabled = false;
            } catch (e) { alert("Erreur: " + e.message); }
        };

        window.onkeydown = (e) => {
            e.preventDefault();
            let c = e.keyCode;
            if(e.key === "Control") c = 128;
            if(e.key === "Shift")   c = 129;
            if(e.key === "Alt")     c = 130;
            if(e.key === "Meta")    c = 131;
            if(!codes.includes(c)) {
                codes.push(c);
                document.getElementById('display').innerText = codes.join(" + ");
            }
        };

        document.getElementById('btnSave').onclick = async () => {
            const writer = port.writable.getWriter();
            const data = "SET:" + codes.join(",") + "\n";
            await writer.write(new TextEncoder().encode(data));
            writer.releaseLock();
            alert("Envoyé ! L'ESP32 redémarre.");
            codes = [];
            document.getElementById('display').innerText = "---";
        };
    </script>
</body>
</html>
