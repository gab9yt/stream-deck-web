<!DOCTYPE html>
<html>
<head>
    <title>Configurateur StreamDeck</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 20px; border: 1px solid #333; display: inline-block; }
        .keys { font-size: 24px; color: #00ff88; margin: 20px; min-height: 40px; }
        button { background: #00ff88; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Mon Logiciel de Config</h1>
        <button id="btnConnect">1. Brancher le StreamDeck</button>
        <p>Tape ton raccourci au clavier :</p>
        <div id="display" class="keys">---</div>
        <button id="btnSave" disabled>2. Enregistrer</button>
    </div>

    <script>
        let port; let codes = [];
        const btnConnect = document.getElementById('btnConnect');
        const btnSave = document.getElementById('btnSave');

        btnConnect.onclick = async () => {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            btnSave.disabled = false;
            btnConnect.innerText = "✅ Connecté";
        };

        window.onkeydown = (e) => {
            e.preventDefault();
            let c = e.keyCode;
            // Conversion touches spéciales
            if(e.key === "Control") c = 128;
            if(e.key === "Shift")   c = 129;
            if(e.key === "Alt")     c = 130;
            if(e.key === "Meta")    c = 131;
            if(!codes.includes(c)) { 
                codes.push(c); 
                document.getElementById('display').innerText = codes.join(" + ");
            }
        };

        btnSave.onclick = async () => {
            const encoder = new TextEncoder();
            const writer = port.writable.getWriter();
            await writer.write(encoder.encode("SET:" + codes.join(",") + "\n"));
            writer.releaseLock();
            alert("Sauvegardé !");
        };
    </script>
</body>
</html>
